<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" fill="none">
  <rect width="700" height="400" fill="#0d0d0d"/>
  <!-- Map grid pattern -->
  <g stroke="rgba(200,169,110,0.06)" stroke-width="1">
    <line x1="0" y1="80"  x2="700" y2="80"/>
    <line x1="0" y1="160" x2="700" y2="160"/>
    <line x1="0" y1="240" x2="700" y2="240"/>
    <line x1="0" y1="320" x2="700" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>
  <!-- World continent outlines (simplified) -->
  <!-- North America simplified -->
  <path d="M60 100 Q80 80 120 90 Q150 95 160 120 Q170 150 155 180 Q140 200 120 210 Q100 215 85 200 Q65 180 60 150 Z" stroke="rgba(200,169,110,0.2)" stroke-width="1" fill="rgba(200,169,110,0.04)"/>
  <!-- Europe simplified -->
  <path d="M280 80 Q310 70 340 80 Q355 90 350 120 Q345 140 325 145 Q305 150 290 135 Q275 115 280 80Z" stroke="rgba(200,169,110,0.2)" stroke-width="1" fill="rgba(200,169,110,0.04)"/>
  <!-- Asia simplified -->
  <path d="M400 60 Q470 50 530 70 Q570 85 580 120 Q590 150 565 170 Q530 185 490 180 Q450 175 420 155 Q395 130 400 60Z" stroke="rgba(200,169,110,0.2)" stroke-width="1" fill="rgba(200,169,110,0.04)"/>
  <!-- China dot -->
  <circle cx="520" cy="140" r="6" fill="#c8a96e" opacity="0.9"/>
  <circle cx="520" cy="140" r="14" stroke="#c8a96e" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="520" cy="140" r="22" stroke="#c8a96e" stroke-width="0.5" fill="none" opacity="0.3"/>

  <!-- Connection lines to US/Europe -->
  <path d="M520 140 Q350 60 100 130" stroke="rgba(200,169,110,0.25)" stroke-width="1" stroke-dasharray="6,4" fill="none"/>
  <path d="M520 140 Q440 80 320 105" stroke="rgba(200,169,110,0.25)" stroke-width="1" stroke-dasharray="6,4" fill="none"/>
  <circle cx="100" cy="130" r="4" fill="#c8a96e" opacity="0.7"/>
  <circle cx="320" cy="105" r="4" fill="#c8a96e" opacity="0.7"/>

  <text x="350" y="360" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="9" font-weight="600" fill="rgba(200,169,110,0.5)" letter-spacing="3">GLOBAL PRESENCE · SUZHOU, CHINA</text>
</svg>