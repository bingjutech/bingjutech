<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" fill="none">
  <rect width="700" height="460" fill="#0d0d0d"/>
  <!-- Culture visual: people silhouettes + growth chart -->
  <defs>
    <linearGradient id="cg1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Growth chart -->
  <path d="M80 380 L180 300 L280 340 L380 220 L480 260 L580 160 L640 180" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M80 380 L180 300 L280 340 L380 220 L480 260 L580 160 L640 180 L640 380 Z" fill="url(#cg1)" opacity="0.4"/>
  <!-- Grid -->
  <g stroke="rgba(200,169,110,0.06)" stroke-width="1">
    <line x1="80" y1="160" x2="640" y2="160"/>
    <line x1="80" y1="220" x2="640" y2="220"/>
    <line x1="80" y1="280" x2="640" y2="280"/>
    <line x1="80" y1="340" x2="640" y2="340"/>
    <line x1="80" y1="380" x2="640" y2="380"/>
  </g>
  <!-- Data points -->
  <circle cx="180" cy="300" r="5" fill="#c8a96e"/>
  <circle cx="280" cy="340" r="5" fill="#c8a96e" opacity="0.7"/>
  <circle cx="380" cy="220" r="5" fill="#c8a96e"/>
  <circle cx="480" cy="260" r="5" fill="#c8a96e" opacity="0.7"/>
  <circle cx="580" cy="160" r="5" fill="#c8a96e"/>
  <!-- Person silhouettes -->
  <g fill="rgba(200,169,110,0.3)">
    <circle cx="100" cy="80" r="16"/>
    <path d="M80 120 Q100 105 120 120 L115 150 L85 150 Z"/>
  </g>
  <g fill="rgba(200,169,110,0.5)">
    <circle cx="160" cy="80" r="16"/>
    <path d="M140 120 Q160 105 180 120 L175 150 L145 150 Z"/>
  </g>
  <g fill="rgba(200,169,110,0.4)">
    <circle cx="220" cy="80" r="16"/>
    <path d="M200 120 Q220 105 240 120 L235 150 L205 150 Z"/>
  </g>
  <text x="350" y="50" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="10" font-weight="700" fill="rgba(200,169,110,0.5)" letter-spacing="3">OUR GROWING TEAM</text>
</svg>