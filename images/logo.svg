<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="logoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0c98a"/>
      <stop offset="100%" stop-color="#a07840"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#6b4a20"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" stroke="url(#ringGrad)" stroke-width="2" fill="none"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="74" stroke="rgba(200,169,110,0.3)" stroke-width="1" fill="none"/>
  <!-- BJ monogram -->
  <text x="100" y="118" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="700" fill="url(#logoGrad)" letter-spacing="-2">BJ</text>
  <!-- Network nodes -->
  <circle cx="100" cy="28"  r="4" fill="#c8a96e" opacity="0.8"/>
  <circle cx="164" cy="60"  r="3" fill="#c8a96e" opacity="0.6"/>
  <circle cx="172" cy="140" r="3" fill="#c8a96e" opacity="0.6"/>
  <circle cx="100" cy="172" r="4" fill="#c8a96e" opacity="0.8"/>
  <circle cx="28"  cy="140" r="3" fill="#c8a96e" opacity="0.6"/>
  <circle cx="36"  cy="60"  r="3" fill="#c8a96e" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="100" y1="28" x2="164" y2="60" stroke="rgba(200,169,110,0.3)" stroke-width="1"/>
  <line x1="164" y1="60" x2="172" y2="140" stroke="rgba(200,169,110,0.3)" stroke-width="1"/>
  <line x1="100" y1="28" x2="36"  y2="60"  stroke="rgba(200,169,110,0.3)" stroke-width="1"/>
  <line x1="28"  y1="140" x2="36" y2="60"  stroke="rgba(200,169,110,0.3)" stroke-width="1"/>
</svg>